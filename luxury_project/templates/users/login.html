{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container my-5" style="max-width: 450px;">
    <h2 class="text-center premium-title mb-4">Login</h2>

    <div class="login-card p-5 shadow-lg" style="border-radius: 20px;">
        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="mb-4">
                <label class="form-label premium-label">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-4">
                <label class="form-label premium-label">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-submit w-100 mb-3">Login</button>

            <p class="text-center text-muted">
                Don't have an account? <a href="{% url 'register' %}">Register</a>
            </p>
        </form>
    </div>
</div>

<style>
/* Card styling */
.login-card {
    position: relative;
    background: linear-gradient(145deg, rgba(12,12,25,0.85), rgba(20,20,50,0.85));
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.login-card:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(212,175,55,0.5);
}

/* Premium labels */
.premium-label {
    font-family: 'Playfair Display', serif;
    color: #D4AF37;
    font-weight: 600;
    font-size: 1rem;
    display: block;
}

/* Glassmorphism inputs */
input {
    font-family: 'Montserrat', sans-serif;
    background: rgba(255,255,255,0.05);
    border: 1px solid #D4AF37;
    border-radius: 12px;
    padding: 0.6rem 1rem;
    color: #E5E5E5;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    width: 100%;
    box-sizing: border-box;
    margin-top: 0.5rem;
    margin-bottom: 1rem;
    position: relative;
    z-index: 10;
}

input:focus {
    border-color: #F5E1A4;
    background: rgba(212,175,55,0.08);
    color: #F5E1A4;
    box-shadow: 0 0 12px rgba(212,175,55,0.5);
    outline: none;
}

/* Submit button */
.btn-submit {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #D4AF37, #F5E1A4);
    color: #1C1C1C;
    border: none;
    border-radius: 12px;
    padding: 0.7rem 0;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}
.btn-submit::after {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.3);
    transform: skewX(-25deg);
    transition: all 0.5s ease;
}
.btn-submit:hover::after {
    left: 125%;
}
.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(212,175,55,0.5);
}

/* Premium title */
.premium-title {
    font-family: 'Playfair Display', serif;
    color: #D4AF37;
    font-weight: 700;
    margin-bottom: 2rem;
}

/* Ensure pseudo-elements do not block input */
.login-card::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
}
</style>
{% endblock %}
