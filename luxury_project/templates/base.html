{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Luxury Dashboard{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Self-contained CSS -->
    <style>
        /* --- Body --- */
        body {
            background: radial-gradient(circle at top left, #1C1C1C, #0A0A23);
            font-family: 'Montserrat', sans-serif;
            color: #E5E5E5;
            min-height: 100vh;
        }

        /* --- Navbar --- */
        .navbar-premium {
            background: linear-gradient(135deg, #0A0A23, #1C1C1C);
            border-bottom: 2px solid #D4AF37;
            font-family: 'Montserrat', sans-serif;
        }
        .navbar-premium .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            color: #D4AF37;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .navbar-premium .nav-link {
            color: #E5E5E5;
            margin-left: 1rem;
            transition: color 0.3s ease;
        }
        .navbar-premium .nav-link:hover {
            color: #D4AF37;
        }

        /* --- Container spacing --- */
        main.container {
            padding-top: 2rem;
            padding-bottom: 4rem;
        }

        /* --- Buttons --- */
        .btn-premium {
            background: #1C1C1C;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            background: linear-gradient(145deg, #D4AF37, #F5E1A4);
            color: #1C1C1C;
            transform: translateY(-2px);
        }
        .btn-premium-small {
            background: #1C1C1C;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-premium-small:hover {
            background: #D4AF37;
            color: #1C1C1C;
            transform: translateY(-1px);
        }

        /* --- Page Titles --- */
        .premium-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #D4AF37;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            position: relative;
        }
        .premium-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: #D4AF37;
            margin: 0.5rem auto 0;
            border-radius: 2px;
        }

        /* --- Vehicle Cards --- */
        .vehicle-card {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .vehicle-card:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 36px rgba(212, 175, 55, 0.8);
        }

        /* --- Vehicle Image --- */
        .vehicle-image-wrapper {
            position: relative;
            overflow: hidden;
        }
        .vehicle-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .vehicle-card:hover .vehicle-img {
            transform: scale(1.05);
        }

        /* Shimmer effect */
        .image-shimmer {
            position: absolute;
            top:0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.05) 100%);
            transform: skewX(-20deg);
            pointer-events: none;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* --- Vehicle Info --- */
        .vehicle-info {
            padding: 1rem 1.2rem;
        }
        .vehicle-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #F5E1A4;
        }
        .vehicle-price {
            font-size: 1rem;
            color: #E5E5E5;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-premium shadow-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Luxury Cars</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#premiumNavbar" aria-controls="premiumNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="premiumNavbar">
            <ul class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'vehicles' %}">Vehicles</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
                {% else %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Register</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="container mt-5">
    {% block content %}{% endblock %}
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
